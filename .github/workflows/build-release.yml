name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: 'false'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Show artifacts
        run: Get-ChildItem -Path release -Recurse

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts

      - name: Rename for clarity
        run: |
          for f in ./artifacts/*.exe; do
            [ -f "$f" ] && mv "$f" "./artifacts/InterviewPrep-Setup-${{ github.ref_name }}.exe"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          body: |
            ## 📥 一键安装

            下载 `InterviewPrep-Setup-${{ github.ref_name }}.exe`，双击安装即可使用。

            ---

            ## ✨ v${{ github.ref_name }} 更新内容

            请查看 [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/master/public/RELEASE_NOTES.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
