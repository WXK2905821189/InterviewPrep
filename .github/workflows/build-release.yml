name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            %LOCALAPPDATA%/electron/Cache
            ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 0

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: 'false'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Show artifacts
        run: Get-ChildItem -Path release -Recurse

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 0

      - name: Build macOS dmg
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Show artifacts
        run: ls -la release/

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: release/*.dmg

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          body: |
            ## 📥 下载

            | 平台 | 文件 |
            |------|------|
            | 🪟 Windows | `InterviewPrep Setup *.exe` |
            | 🍎 macOS | `InterviewPrep-*.dmg` |

            ---

            ## ✨ v${{ github.ref_name }} 更新内容

            请查看 [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/master/public/RELEASE_NOTES.md)

            ---

            ### 💻 直接运行源码

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd InterviewPrep
            npm install
            npm start
            # 打开 http://localhost:3456
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
