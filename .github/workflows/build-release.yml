name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release ZIP
        run: |
          mkdir -p dist
          zip -r dist/InterviewPrep-portable.zip \
            public/ chatflow/ electron/ knowledge/ \
            server.js package.json package-lock.json \
            render.yaml .gitignore \
            -x "node_modules/*" -x ".local/*" -x ".data/*" -x "logs/*" -x "*.log"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InterviewPrep-portable.zip
          body: |
            ## 🚀 在线使用（推荐）

            **无需下载，浏览器打开即用：**

            👉 **[一键部署到 Render](https://render.com/deploy?repo=https://github.com/${{ github.repository }}&ref=${{ github.ref_name }})**

            > 免费托管，自动更新，打开浏览器就能用。

            ---

            ## 📥 下载离线版

            下载 `InterviewPrep-portable.zip`，解压后：

            ```bash
            npm install
            npm start
            # 打开 http://localhost:3456
            ```

            ---

            ## ✨ v${{ github.ref_name }} 更新内容

            **[📋 完整发行说明](https://github.com/${{ github.repository }}/blob/master/public/RELEASE_NOTES.md)**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
