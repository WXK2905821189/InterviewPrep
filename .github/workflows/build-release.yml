name: Build & Release

on:
  push:
    tags:
      - 'v*'          # 每次打 tag 自动触发
  workflow_dispatch:   # 也支持手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --x64 -c.extraMetadata.main=electron/main.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS dmg
        run: npx electron-builder --mac --x64 -c.extraMetadata.main=electron/main.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: release/*.dmg

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          body: |
            ## 📥 下载

            | 平台 | 文件 |
            |------|------|
            | 🪟 Windows | `InterviewPrep Setup *.exe` |
            | 🍎 macOS | `InterviewPrep-*.dmg` |

            ---

            ## ✨ v${{ github.ref_name }} 更新内容

            请查看 [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/master/public/RELEASE_NOTES.md)

            ---

            ### 💻 或者直接运行源码

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd InterviewPrep
            npm install
            npm start
            # 打开 http://localhost:3456
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
