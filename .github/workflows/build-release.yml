name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepare release package
        run: |
          mkdir -p dist/interview-prep
          cp -r public chatflow electron knowledge server.js package.json package-lock.json dist/interview-prep/
          cp -r ai-provider-kit dist/interview-prep/ 2>/dev/null || true

      - name: Create ZIP
        run: |
          cd dist
          zip -r InterviewPrep-v${{ github.ref_name }}-portable.zip interview-prep

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InterviewPrep-v${{ github.ref_name }}-portable.zip
          body: |
            ## 📥 下载

            | 文件 | 说明 |
            |------|------|
            | `InterviewPrep-v${{ github.ref_name }}-portable.zip` | 源码包，解压后运行 |

            ---

            ## 🚀 使用方式

            ```bash
            # 1. 解压
            unzip InterviewPrep-v*-portable.zip
            cd interview-prep

            # 2. 安装依赖
            npm install

            # 3. 启动
            npm start
            # 打开 http://localhost:3456
            ```

            ---

            ## ✨ v${{ github.ref_name }} 更新内容

            请查看 [RELEASE_NOTES.md](https://github.com/${{ github.repository }}/blob/master/public/RELEASE_NOTES.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
